<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Offline — AlloCare</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #f1f5f9; color: #334155; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
        .card { background: #fff; border-radius: 1rem; padding: 2.5rem; text-align: center; max-width: 400px; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
        h1 { font-size: 1.5rem; margin-bottom: .75rem; color: #0f172a; }
        p { color: #64748b; margin-bottom: 1.5rem; line-height: 1.6; }
        button { background: #059669; color: #fff; border: none; padding: .75rem 1.5rem; border-radius: .5rem; font-size: .875rem; font-weight: 600; cursor: pointer; }
        button:active { transform: scale(.97); }
        .icon { font-size: 3rem; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">📡</div>
        <h1>You're offline</h1>
        <p>AlloCare requires an internet connection for this page. Check your connection and try again.</p>
        <button onclick="window.location.reload()">Retry</button>
    </div>
</body>
</html>
